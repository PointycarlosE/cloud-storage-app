<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Meu Drive Pessoal</title>
    <!-- Script de tema ANTES do CSS para evitar flash -->
    <script>
        (function () {
            try {
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
                window.__initialTheme = savedTheme;
            } catch (e) {
                console.log('Erro ao acessar localStorage:', e);
            }
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <header class="cabecalho">
        <nav class="menu-principal">
            <ul class="menu-lista">
                <li><a href="{{ url_for('main.home') }}" class="menu-link">🏠 Home</a></li>
                <li><a href="{{ url_for('main.objetivos') }}" class="menu-link">📋 Objetivos</a></li>
                <li><a href="{{ url_for('file.explorar') }}" class="menu-link">📁 Explorador</a></li>
            </ul>
        </nav>

        <!-- Botão de tema -->
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">
            <span class="theme-icon">☀️</span>
        </button>
    </header>

    <main class="conteudo-principal">
        <div class="erro-container">
            <div class="erro-icone">⚠️</div>
            <h1 class="erro-titulo">Ocorreu um erro</h1>
            <p class="erro-mensagem">{{ mensagem }}</p>
            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                <a href="{{ url_for('main.home') }}" class="botao botao-secundario">🏠 Voltar para Home</a>
                <a href="{{ url_for('file.explorar') }}" class="botao botao-primario">📁 Voltar para Repositório</a>
            </div>
        </div>
    </main>

    <footer class="rodape">
        <p>Meu Drive Pessoal © 2024 - Seu repositório de arquivos</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
