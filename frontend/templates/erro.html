<!DOCTYPE html>
<html lang="pt-br" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Meu Drive Pessoal</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">

    <script>
        (function () {
            try {
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
                window.__initialTheme = savedTheme;
            } catch (e) {
                console.log('Erro ao acessar localStorage:', e);
            }
        })();
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-simple">
    <header class="header-simple">
        <nav class="header-nav">
            <a href="{{ url_for('file.explorar') }}">📁 Explorador</a>
            <a href="{{ url_for('main.objetivos') }}">📋 Objetivos</a>
        </nav>
        <div class="header-actions">
            <button id="theme-toggle" class="theme-btn-simple" aria-label="Alternar tema">
                <span class="theme-icon">☀️</span>
            </button>
        </div>
    </header>

    <main class="content-centered">
        <div class="error-container">
            <div class="error-icon">⚠️</div>
            <h1 class="error-title">Ocorreu um erro</h1>
            <p class="error-message">{{ mensagem }}</p>
            <div class="error-actions">
                <a href="{{ url_for('file.explorar') }}" class="btn-primary">📁 Voltar para Explorador</a>
            </div>
        </div>
    </main>

    <footer class="footer-simple">
        <p>Meu Drive Pessoal © 2024 - Seu repositório de arquivos</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
